<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성균관 공인중개사 박성균 대표 디지털 명함</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #fcfcfc; color: #444; }
        a { text-decoration: none; color: inherit; }
        .card { width: 360px; background: #fff; margin: 40px auto; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); overflow: hidden; border: 1px solid #f0f0f0; }
        
        /* 상단 섹션 */
        .card-top { background-color: #fff; padding: 40px 20px 25px; text-align: center; border-bottom: 1.5px solid #b79c7b; }
        .profile-pic { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(183, 156, 123, 0.2); object-fit: cover; margin-bottom: 20px; }
        .company-name { font-size: 28px; font-weight: 900; color: #b79c7b; margin: 0; letter-spacing: 2px; }
        .titles { font-size: 14px; color: #888; margin: 8px 0 18px; font-weight: 400; }
        .representative { font-size: 24px; font-weight: 700; color: #222; margin: 0; }
        .hp-link { font-size: 18px; font-weight: 700; color: #b79c7b; display: block; margin-top: 8px; }

        /* 하단 섹션 */
        .card-bottom { padding: 30px 25px; background-color: #fff; }
        .contact-info { list-style: none; padding: 0; margin: 0 0 25px; }
        .contact-info li { font-size: 14px; color: #555; margin-bottom: 14px; display: flex; align-items: flex-start; }
        .icon { width: 24px; margin-right: 12px; color: #b79c7b; font-weight: bold; flex-shrink: 0; }
        .account-box { background-color: #f9f7f4; padding: 15px; border-radius: 12px; font-size: 13px; text-align: center; color: #666; margin-bottom: 25px; border: 1px dashed #d1c4b4; }
        .copy-btn { background-color: #b79c7b; color: #fff; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; margin-left: 8px; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn { display: flex; align-items: center; justify-content: center; background-color: #fff; border: 1.5px solid #b79c7b; color: #b79c7b; padding: 14px 0; border-radius: 12px; font-size: 14px; font-weight: 700; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="card-top">
            <img src="mypic.jpg" alt="박성균 대표" class="profile-pic">
            <h1 class="company-name">성균관</h1>
            <div class="titles">공인중개사무소 · 권리분석사</div>
            <p class="representative">대표 <b>박 성 균</b></p>
            <a href="tel:01086866100" class="hp-link">010-8686-6100</a>
        </div>

        <div class="card-bottom">
            <ul class="contact-info">
                <li><span class="icon">T</span> 033-735-8701</li>
                <li><span class="icon">F</span> 033-735-8703</li>
                <li><span class="icon">@</span> pstarking@naver.com</li>
                <li><span class="icon">B</span> blog.naver.com/pstarking</li>
                <li><span class="icon">A</span> 강원도 원주시 무실동 만대로 119<br>휴먼시아6차 상가 102호</li>
            </ul>
            <div class="account-box">
                농협 312-0209-5399-71
                <button class="copy-btn" onclick="copyAccount()">계좌복사</button>
            </div>
            <div class="action-btns">
                <a href="tel:01086866100" class="action-btn">전화 연결</a>
                <a href="https://blog.naver.com/pstarking" target="_blank" class="action-btn">매물 보기</a>
            </div>
        </div>
    </div>
    <script>
        function copyAccount() {
            navigator.clipboard.writeText('농협 312-0209-5399-71').then(() => alert('계좌번호가 복사되었습니다.'));
        }
    </script>
</body>
</html>
